name: "forza"
description: "Run forza to process GitHub issues and PRs through configurable workflows"
author: "Josh Rotenberg"

inputs:
  version:
    description: "forza version to install (e.g. '0.5.0', 'latest', 'source', 'skip')"
    default: "latest"
  agent:
    description: "Agent to install and use: 'claude' (default) or 'codex'"
    default: "claude"
  config:
    description: "Path to forza config file"
    default: "forza.toml"
  command:
    description: "forza command to run: 'auto', 'run', 'issue', 'pr', 'plan'"
    default: "auto"
  args:
    description: "Additional arguments passed to the forza command"
    default: ""
  anthropic_api_key:
    description: "Anthropic API key (alternative to setting ANTHROPIC_API_KEY env var)"
    required: false

outputs:
  outcome:
    description: "Run outcome (e.g. pr_created, pr_merged, failed)"
    value: ${{ steps.forza.outputs.outcome }}
  run_id:
    description: "forza run ID"
    value: ${{ steps.forza.outputs.run_id }}

branding:
  icon: "zap"
  color: "orange"

runs:
  using: "composite"
  steps:
    - name: Install agent
      shell: bash
      env:
        FORZA_AGENT: ${{ inputs.agent }}
      run: |
        set -euo pipefail
        case "$FORZA_AGENT" in
          claude)
            echo "Installing Claude Code..."
            curl -fsSL https://claude.ai/install.sh | bash
            claude --version || echo "Claude Code installed"
            ;;
          codex)
            echo "Installing Codex CLI..."
            npm install -g @openai/codex
            codex --version || echo "Codex CLI installed"
            ;;
          skip)
            echo "Skipping agent install (pre-installed)"
            ;;
          *)
            echo "Unknown agent: $FORZA_AGENT"
            exit 1
            ;;
        esac

    - name: Install forza
      shell: bash
      env:
        FORZA_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        if [ "$FORZA_VERSION" = "skip" ]; then
          echo "Skipping forza install (pre-installed)"
          forza --version
          exit 0
        fi

        if [ "$FORZA_VERSION" = "source" ]; then
          echo "Installing forza from source (cargo install)"
          cargo install forza --git https://github.com/joshrotenberg/forza --locked
          forza --version
          exit 0
        fi

        if [ "$FORZA_VERSION" = "latest" ]; then
          FORZA_VERSION=$(curl -sL https://api.github.com/repos/joshrotenberg/forza/releases/latest | jq -r .tag_name | sed 's/^forza-v//')
        fi

        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="x86_64" ;;
          aarch64|arm64) ARCH="aarch64" ;;
          *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        OS=$(uname -s | tr '[:upper:]' '[:lower:]')

        URL="https://github.com/joshrotenberg/forza/releases/download/forza-v${FORZA_VERSION}/forza-${ARCH}-unknown-${OS}-gnu.tar.xz"
        echo "Installing forza v${FORZA_VERSION} from ${URL}"
        curl -sL "$URL" | tar xJ -C /usr/local/bin forza

        forza --version

    - name: Set API key
      if: inputs.anthropic_api_key != ''
      shell: bash
      run: echo "ANTHROPIC_API_KEY=${{ inputs.anthropic_api_key }}" >> "$GITHUB_ENV"

    - name: Run forza
      id: forza
      shell: bash
      env:
        FORZA_CONFIG: ${{ inputs.config }}
        FORZA_COMMAND: ${{ inputs.command }}
        FORZA_ARGS: ${{ inputs.args }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_ACTION: ${{ github.event.action }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: ${{ github.action_path }}/entrypoint.sh
