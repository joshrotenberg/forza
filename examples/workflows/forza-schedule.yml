# Scheduled mode — forza runs a full discovery cycle on a cron schedule.
#
# Useful for condition routes (auto-rebase, auto-fix-ci, auto-merge) that
# monitor PR state. Runs every 5 minutes.

name: forza (scheduled)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  forza:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/setup-claude-code@v1

      - uses: joshrotenberg/forza-action@v1
        with:
          command: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
