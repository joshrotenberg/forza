[global]
max_concurrency = 3
model = "claude-sonnet-4-6"
gate_label = "forza:ready"
branch_pattern = "automation/{issue}-{slug}"

[security]
authorization_level = "contributor"

[validation]
commands = [
    "cargo fmt --all -- --check",
    "cargo clippy --all-targets -- -D warnings",
    "cargo test --lib",
]

[repos."joshrotenberg/forza"]

[repos."joshrotenberg/forza".routes.bugfix]
type = "issue"
label = "bug"
workflow = "bug"
concurrency = 1
poll_interval = 60

[repos."joshrotenberg/forza".routes.features]
type = "issue"
label = "enhancement"
workflow = "feature"
concurrency = 2
poll_interval = 300

[repos."joshrotenberg/forza".routes.research]
type = "issue"
label = "research"
workflow = "research"
concurrency = 3
poll_interval = 3600

[repos."joshrotenberg/forza".routes.chores]
type = "issue"
label = "chore"
workflow = "chore"
concurrency = 2
poll_interval = 600
