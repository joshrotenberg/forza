# forza.toml — forza's own configuration (self-hosting)
#
# This is the config that forza uses to process its own issues and PRs.
# It serves as both a working config and documentation of how to set up
# forza for a Rust project.

[global]
# Maximum concurrent tasks across all routes.
max_concurrency = 3
# Default model for all agent stages.
model = "claude-sonnet-4-6"
# Issues must have this label to be picked up by the watch loop.
gate_label = "forza:ready"
# Branch naming pattern. {issue} = issue/PR number, {slug} = title slug.
branch_pattern = "automation/{issue}-{slug}"
# Auto-merge PRs after CI passes (uses gh pr merge --auto --squash).
# The merge stage runs `gh pr merge --auto --squash --delete-branch` by default.
# --auto queues the merge; GitHub completes it once all required status checks pass.
# For repos without branch protection / required checks, --auto is not supported
# and the command will fail. In that case, use a custom workflow template with a
# fallback command that tries --auto first, then falls back to a direct merge:
#
#   [[workflow_templates]]
#   name = "chore"
#   stages = [
#     { kind = "implement" },
#     { kind = "test" },
#     { kind = "open_pr" },
#     { kind = "merge", agentless = true,
#       command = "gh pr merge --auto --squash --delete-branch || gh pr merge --squash --delete-branch" },
#   ]
auto_merge = true

[security]
# "trusted" allows merge and push operations.
# authorization_level controls what the Claude agent is permitted to do (merge, push,
# etc.). It does NOT restrict shell commands run by forza itself — see the note on
# the shell command trust boundary below.
authorization_level = "trusted"

[validation]
# These commands run between stages to catch regressions early.
# If any command fails, the run stops.
#
# TRUST BOUNDARY: These strings are passed directly to `sh -c`. Treat this section
# (and all hook, agentless command, and condition fields) as executable code. Only
# values from a trusted forza.toml are safe to run; if untrusted sources can modify
# this file they can execute arbitrary shell commands with forza's privileges.
commands = [
    "cargo fmt --all -- --check",
    "cargo clippy --all-targets -- -D warnings",
    "cargo test --lib",
]

# ── Repository: joshrotenberg/forza ──────────────────────────────────
# Each repo gets its own route table. Routes map label + type to a
# workflow template with per-route concurrency and polling settings.

[repos."joshrotenberg/forza"]

# Bug fixes — low concurrency, fast polling (check every minute).
[repos."joshrotenberg/forza".routes.bugfix]
type = "issue"
label = "bug"
workflow = "bug"
concurrency = 1
poll_interval = 60

# New features — higher concurrency, slower polling.
[repos."joshrotenberg/forza".routes.features]
type = "issue"
label = "enhancement"
workflow = "feature"
concurrency = 2
poll_interval = 300

# Research tasks — highest concurrency (read-only, no conflicts).
[repos."joshrotenberg/forza".routes.research]
type = "issue"
label = "research"
workflow = "research"
concurrency = 3
poll_interval = 3600

# Documentation improvements.
[repos."joshrotenberg/forza".routes.docs]
type = "issue"
label = "documentation"
workflow = "chore"
concurrency = 2
poll_interval = 600

# Chores (badges, config, etc.)
[repos."joshrotenberg/forza".routes.chores]
type = "issue"
label = "chore"
workflow = "chore"
concurrency = 2
poll_interval = 600

# ── PR routes ────────────────────────────────────────────────────────
# These routes handle PRs that need automated fixes. Label a PR with
# the route label to trigger processing via `forza pr` or watch mode.

# Full PR fix — rebase onto main, fix CI failures, then merge.
# This is the most common PR maintenance workflow: rebase first so the
# branch is up to date, then fix whatever breaks (clippy, tests, etc.).
[repos."joshrotenberg/forza".routes.fix-pr]
type = "pr"
label = "forza:fix-pr"
workflow = "pr-fix"
concurrency = 2

# Fix CI failures only (no rebase). Use when the branch is current but
# CI is failing due to code issues.
[repos."joshrotenberg/forza".routes.fix-ci]
type = "pr"
label = "forza:fix-ci"
workflow = "pr-fix-ci"
concurrency = 2

# Rebase only. Use when the branch just needs to be rebased but the
# code itself is fine.
[repos."joshrotenberg/forza".routes.rebase]
type = "pr"
label = "forza:rebase"
workflow = "pr-rebase"
concurrency = 2

# ── Condition routes (monitors) ──────────────────────────────────────
# These routes watch forza-owned PRs and automatically trigger fixes
# when problems are detected. No manual labeling needed.
#
# Each route does one thing. The poll loop handles sequencing naturally:
# fix conflicts this cycle, fix CI next cycle, merge the cycle after.

# Rebase forza-owned PRs that have merge conflicts.
[repos."joshrotenberg/forza".routes.auto-rebase]
type = "pr"
condition = "has_conflicts"
workflow = "pr-rebase"
scope = "forza_owned"
max_retries = 3
concurrency = 2
poll_interval = 60

# Fix CI failures on forza-owned PRs.
[repos."joshrotenberg/forza".routes.auto-fix-ci]
type = "pr"
condition = "ci_failing"
workflow = "pr-fix-ci"
scope = "forza_owned"
max_retries = 3
concurrency = 2
poll_interval = 60

# Merge forza-owned PRs when CI is green and no objections.
[repos."joshrotenberg/forza".routes.auto-merge]
type = "pr"
condition = "ci_green_no_objections"
workflow = "pr-merge"
scope = "forza_owned"
max_retries = 3
concurrency = 2
poll_interval = 60
